spring.application.name=pcadvisor

# --- Base de datos MySQL ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pcadvisor}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# 'update' es practico en desarrollo. En un entorno mas formal se reemplaza por
# 'validate' + migraciones (ej. Flyway), pero para el MVP esto es suficiente.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Servidor ---
server.port=${SERVER_PORT:8080}

# --- Groq (IA, compatible con formato OpenAI) ---
groq.api-key=${GROQ_API_KEY:}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# --- CORS: origenes permitidos para web (Vite) y mobile (Ionic/Capacitor) ---
app.cors.allowed-origins=http://localhost:5173,http://localhost:8100,capacitor://localhost

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.htmlS
springdoc.api-docs.path=/api-docs