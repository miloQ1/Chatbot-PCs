spring:
  application:
    name: pcadvisor

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pcadvisor}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' es practico en desarrollo. En un entorno mas formal se reemplaza por
      # 'validate' + migraciones (ej. Flyway), pero para el MVP esto es suficiente.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# Configuracion del cliente de IA (Groq, compatible con formato OpenAI)
groq:
  api-key: ${GROQ_API_KEY:}
  base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

# CORS - origenes permitidos para web (Vite) y mobile (Ionic/Capacitor)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8100,capacitor://localhost}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs