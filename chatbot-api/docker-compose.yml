services:
  mysql:
    image: mysql:8.4
    container_name: pcadvisor-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pcadvisor
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-pcadvisor}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-pcadvisor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: pcadvisor-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: pcadvisor
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-pcadvisor}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: llama-3.3-70b-versatile
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8100,capacitor://localhost"
    ports:
      - "8080:8080"

volumes:
  mysql_data: